{% extends 'admin/base.html' %}
{% block title %}{% if product %}Edit{% else %}Add{% endif %} Product{% endblock %}
{% block page_title %}{% if product %}Edit Product{% else %}Add New Product{% endif %}{% endblock %}
{% block content %}
<div style="max-width:720px;">
  <div style="background:#fff;border-radius:12px;padding:2rem;box-shadow:0 1px 4px rgba(0,0,0,.05);border:1.5px solid var(--gray-200);">
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;">
        <div style="grid-column:1/-1;"><label style="display:block;font-size:.8rem;font-weight:600;margin-bottom:.3rem;">Product Name *</label><input type="text" name="name" class="fc" style="width:100%;" value="{{ product.name if product else '' }}" required></div>
        <div><label style="display:block;font-size:.8rem;font-weight:600;margin-bottom:.3rem;">SKU *</label><input type="text" name="sku" class="fc" style="width:100%;" value="{{ product.sku if product else '' }}" required></div>
        <div><label style="display:block;font-size:.8rem;font-weight:600;margin-bottom:.3rem;">Brand *</label><select name="brand" class="fc" style="width:100%;" required>{% for b in ['Schneider Electric','Siemens','GE','Philips','Legrand','Azmat Cables','Pakistan Cables','Mitsubishi','Other'] %}<option value="{{ b }}" {% if product and product.brand==b %}selected{% endif %}>{{ b }}</option>{% endfor %}</select></div>
        <div><label style="display:block;font-size:.8rem;font-weight:600;margin-bottom:.3rem;">Category *</label><select name="category_id" class="fc" style="width:100%;" required>{% for cat in categories %}<option value="{{ cat.id }}" {% if product and product.category_id==cat.id %}selected{% endif %}>{{ cat.name }}</option>{% endfor %}</select></div>
        <div><label style="display:block;font-size:.8rem;font-weight:600;margin-bottom:.3rem;">Price (PKR) *</label><input type="number" step="0.01" name="price" class="fc" style="width:100%;" value="{{ product.price if product else '' }}" required></div>
        <div><label style="display:block;font-size:.8rem;font-weight:600;margin-bottom:.3rem;">Stock Qty *</label><input type="number" name="stock" class="fc" style="width:100%;" value="{{ product.stock if product else 0 }}" required></div>
        <div style="grid-column:1/-1;"><label style="display:block;font-size:.8rem;font-weight:600;margin-bottom:.3rem;">Image URL</label><input type="text" name="image_url" class="fc" style="width:100%;" value="{{ product.image_url if product else '' }}" placeholder="https://..."></div>
        <div style="grid-column:1/-1;"><label style="display:block;font-size:.8rem;font-weight:600;margin-bottom:.3rem;">Description</label><textarea name="description" class="fc" style="width:100%;" rows="4">{{ product.description if product else '' }}</textarea></div>
        {% if product %}
        <div>
          <label style="display:flex;align-items:center;gap:.5rem;cursor:pointer;font-size:.84rem;font-weight:600;">
            <input type="checkbox" name="is_active" {% if product.is_active %}checked{% endif %} style="width:15px;height:15px;">
            Active
          </label>
        </div>
        {% endif %}
      </div>
      <div style="display:flex;gap:1rem;margin-top:1.5rem;">
        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> {% if product %}Save{% else %}Add Product{% endif %}</button>
        <a href="{{ url_for('admin_products') }}" class="btn btn-outline"><i class="fas fa-times"></i> Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
